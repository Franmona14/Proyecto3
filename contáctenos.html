<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contacto - Plomería Profesional</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

  <header class="header">
    <div class="container nav-container">
      <a href="index.html" class="logo">PlomeríaPro</a>
      <nav class="nav">
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Servicios</a>
        <a href="contacto.html" class="active">Contáctanos</a>
      </nav>
    </div>
  </header>

  <a href="https://www.instagram.com/tuusuario" target="_blank" class="float-left" title="Seguinos en Instagram">
    <i class="fab fa-instagram"></i>
  </a>
  <a href="https://wa.me/1234567890" target="_blank" class="float-right" title="Escribinos por WhatsApp">
    <i class="fab fa-whatsapp"></i>
  </a>

  <main class="container" style="margin-top: 4rem; padding-bottom: 3rem;">
    <h1 style="text-align:center; color:#002f5f; margin-bottom: 2rem;">Contacto</h1>
    <div style="max-width: 600px; margin: 0 auto;">
      <form action="mailto:consultas@plomeria.com" method="post" enctype="text/plain">
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre" required style="width:100%; padding:8px; margin-bottom:1rem;"><br>

        <label for="email">Correo electrónico:</label><br>
        <input type="email" id="email" name="email" required style="width:100%; padding:8px; margin-bottom:1rem;"><br>

        <label for="mensaje">Mensaje:</label><br>
        <textarea id="mensaje" name="mensaje" rows="5" required style="width:100%; padding:8px;"></textarea><br><br>

        <button type="submit" class="btn-primary">Enviar consulta</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2025 Plomería Profesional. Todos los derechos reservados.</p>
  </footer>

</body>
</html>
